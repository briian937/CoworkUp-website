  function h(tag, attrs, ...children) {
    let html = `<${tag}`;
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (v === false || v == null) continue;
        html += ` ${k}="${String(v).replace(/"/g, '&quot;')}"`;
      }
    }
    html += ">";
    const voidTags = new Set(["img", "input", "br", "hr", "meta", "link"]);
    if (!voidTags.has(tag)) {
      for (const c of children) {
        if (c == null || c === false) continue;
        if (Array.isArray(c)) html += c.join("");
        else html += c;
      }
      html += `</${tag}>`;
    }
    return html;
  }

  function initCarousel(el) {
    const track = el.querySelector(".carousel-track");
    const slides = track.querySelectorAll(".carousel-slide");
    const counter = el.querySelector(".carousel-counter");
    const dotsWrap = el.querySelector(".carousel-dots");
    const prevBtn = el.querySelector('[data-dir="prev"]');
    const nextBtn = el.querySelector('[data-dir="next"]');
    const n = slides.length;
    let visible = 3;
    let current = 0;

    function getVisible() {
      if (window.innerWidth <= 560) return 1;
      if (window.innerWidth <= 880) return 2;
      return 3;
    }

    function update() {
      visible = getVisible();
      const pages = Math.max(1, n - visible + 1);
      current = Math.min(current, pages - 1);

      const first = slides[0];
      if (!first) return;
      const slideW = first.getBoundingClientRect().width;
      const gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap || "0");
      track.style.transform = `translateX(-${current * (slideW + gap)}px)`;

      counter.textContent = `${String(current + 1).padStart(2, "0")} / ${String(pages).padStart(2, "0")}`;

      dotsWrap.innerHTML = "";
      for (let i = 0; i < pages; i++) {
        const dot = document.createElement("button");
        dot.className = "carousel-dot" + (i === current ? " active" : "");
        dot.setAttribute("aria-label", `Go to page ${i + 1}`);
        dot.addEventListener("click", () => { current = i; update(); });
        dotsWrap.appendChild(dot);
      }
    }

    function go(dir) {
      const pages = Math.max(1, n - getVisible() + 1);
      current = ((current + dir) % pages + pages) % pages;
      update();
    }

    prevBtn.addEventListener("click", () => go(-1));
    nextBtn.addEventListener("click", () => go(1));

    update();
    window.addEventListener("resize", update);

    const autoplay = setInterval(() => go(1), 4500);
    el.addEventListener("mouseenter", () => clearInterval(autoplay));
  }

  function initReveal() {
    const els = document.querySelectorAll(".reveal");
    if (!els.length) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add("in"), i * 50);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 });
    els.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add("in");
      } else {
        io.observe(el);
      }
    });
  }
