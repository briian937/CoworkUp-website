  /* ============================================================
     HELPERS
     ============================================================ */
  function h(tag, attrs, ...children) {
    let html = `<${tag}`;
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (v === false || v == null) continue;
        html += ` ${k}="${String(v).replace(/"/g, '&quot;')}"`;
      }
    }
    html += ">";
    const voidTags = new Set(["img", "input", "br", "hr", "meta", "link"]);
    if (!voidTags.has(tag)) {
      for (const c of children) {
        if (c == null || c === false) continue;
        if (Array.isArray(c)) html += c.join("");
        else html += c;
      }
      html += `</${tag}>`;
    }
    return html;
  }

  /* ============================================================

     ============================================================ */
  function getRoute() {
    return (window.location.hash || "#/").replace(/^#/, "") || "/";
  }

  function routeToKey(route) {
    if (route === "/" || route === "") return "home";
    if (route === "/spaces/ruzafa") return "ruzafa";
    if (route === "/spaces/puerta-del-mar") return "puerta";
    if (route === "/pricing") return "pricing";
    if (route === "/about") return "about";
    if (route === "/contact") return "contact";
    return "home";
  }

  function renderPage(route) {
    if (route === "/" || route === "") return renderHome();
    if (route === "/spaces/ruzafa") return renderSpaceDetail("ruzafa");
    if (route === "/spaces/puerta-del-mar") return renderSpaceDetail("puerta-del-mar");
    if (route === "/pricing") return renderPricing();
    if (route === "/about") return renderAbout();
    if (route === "/contact") return renderContact();
    return renderHome();
  }

  function mount() {
    const route = getRoute();
    const current = routeToKey(route);
    const root = document.getElementById("root");
    root.innerHTML = renderNav(current) + renderPage(route) + renderFooter();
    bindInteractions();
    window.scrollTo({ top: 0, behavior: "instant" });
  }

  /* ============================================================
     INTERACTIONS
     ============================================================ */
  function bindInteractions() {
    // Mobile menu
    const toggle = document.querySelector(".menu-toggle");
    const mobileMenu = document.querySelector(".mobile-menu");
    if (toggle && mobileMenu) {
      toggle.addEventListener("click", () => {
        const isOpen = mobileMenu.classList.toggle("open");
        toggle.textContent = isOpen ? "✕" : "☰";
      });
      mobileMenu.querySelectorAll("a").forEach(a => {
        a.addEventListener("click", () => {
          mobileMenu.classList.remove("open");
          toggle.textContent = "☰";
        });
      });
    }

    // FAQ
    document.querySelectorAll(".faq-q").forEach(btn => {
      btn.addEventListener("click", () => {
        const item = btn.closest(".faq-item");
        item.classList.toggle("open");
        btn.setAttribute("aria-expanded", item.classList.contains("open"));
      });
    });

    // Contact form
    const form = document.getElementById("contact-form");
    if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        form.closest(".contact-form-card").innerHTML = `
          ${eyebrow("Book a tour or ask anything")}
          <div style="margin-top:24px;padding:28px;border-radius:var(--r-md);background:var(--c-accent-soft);border:1px solid #F4E48A">
            <h3 style="font-family:var(--font-display);font-weight:600;font-size:28px;letter-spacing:-0.025em;margin:0 0 8px">Got it. Thanks!</h3>
            <p style="margin:0;color:var(--c-ink-soft)">We usually reply within a few hours. Check your inbox (and maybe spam, just in case).</p>
          </div>
        `;
      });
    }

    // Carousels
    document.querySelectorAll("[data-carousel]").forEach(initCarousel);

    // Scroll reveals
    initReveal();
  }

  function initCarousel(el) {
    const track = el.querySelector(".carousel-track");
    const slides = track.querySelectorAll(".carousel-slide");
    const counter = el.querySelector(".carousel-counter");
    const dotsWrap = el.querySelector(".carousel-dots");
    const prevBtn = el.querySelector('[data-dir="prev"]');
    const nextBtn = el.querySelector('[data-dir="next"]');
    const n = slides.length;
    let visible = 3;
    let current = 0;

    function getVisible() {
      if (window.innerWidth <= 560) return 1;
      if (window.innerWidth <= 880) return 2;
      return 3;
    }

    function update() {
      visible = getVisible();
      const pages = Math.max(1, n - visible + 1);
      current = Math.min(current, pages - 1);

      const first = slides[0];
      if (!first) return;
      const slideW = first.getBoundingClientRect().width;
      const gap = parseFloat(getComputedStyle(track).columnGap || getComputedStyle(track).gap || "0");
      track.style.transform = `translateX(-${current * (slideW + gap)}px)`;

      counter.textContent = `${String(current + 1).padStart(2, "0")} / ${String(pages).padStart(2, "0")}`;

      dotsWrap.innerHTML = "";
      for (let i = 0; i < pages; i++) {
        const dot = document.createElement("button");
        dot.className = "carousel-dot" + (i === current ? " active" : "");
        dot.setAttribute("aria-label", `Go to page ${i + 1}`);
        dot.addEventListener("click", () => { current = i; update(); });
        dotsWrap.appendChild(dot);
      }
    }

    function go(dir) {
      const pages = Math.max(1, n - getVisible() + 1);
      current = ((current + dir) % pages + pages) % pages;
      update();
    }

    prevBtn.addEventListener("click", () => go(-1));
    nextBtn.addEventListener("click", () => go(1));

    update();
    window.addEventListener("resize", update);

    const autoplay = setInterval(() => go(1), 4500);
    el.addEventListener("mouseenter", () => clearInterval(autoplay));
  }

  function initReveal() {
    const els = document.querySelectorAll(".reveal");
    if (!els.length) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add("in"), i * 50);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.05 });
    els.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add("in");
      } else {
        io.observe(el);
      }
    });
  }

  /* ============================================================
     INIT
     ============================================================ */
  window.addEventListener("hashchange", mount);
  mount();
  </script>
</body>
</html>
